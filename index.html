<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Gorev, alisveris, not ve harcama takibi icin mobil PWA.">
    <title>HepsiVar</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Bugun</p>
          <h1>HepsiVar</h1>
        </div>
        <button id="installButton" class="icon-button hidden" type="button" aria-label="Uygulamayi yukle" title="Yukle">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main class="main-view">
        <section id="dashboard" class="dashboard" aria-label="Ozet"></section>
        <section id="panel" class="panel" aria-live="polite"></section>
      </main>

      <nav class="tabbar" aria-label="Ana menuler">
        <button class="tab active" type="button" data-view="tasks" aria-label="Gorevler">
          <span class="tab-icon">✓</span>
          <span>Gorev</span>
        </button>
        <button class="tab" type="button" data-view="shopping" aria-label="Alisveris">
          <span class="tab-icon">□</span>
          <span>Liste</span>
        </button>
        <button class="tab" type="button" data-view="notes" aria-label="Notlar">
          <span class="tab-icon">≡</span>
          <span>Not</span>
        </button>
        <button class="tab" type="button" data-view="expenses" aria-label="Harcamalar">
          <span class="tab-icon">₺</span>
          <span>Para</span>
        </button>
      </nav>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong></strong>
        <p></p>
      </div>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
